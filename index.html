<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>Coming Soon</title>
		<style>
			:root{--bg:#0f1724;--card:#0b1220;--accent:#60a5fa;--text:#e6eef8}
			html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#071029 0%,#0f1724 100%);color:var(--text)}
			.wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:2rem}
			.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);backdrop-filter:blur(6px);padding:3rem 2.5rem;border-radius:12px;max-width:720px;text-align:center;box-shadow:0 6px 30px rgba(2,6,23,0.6)}
			h1{margin:0 0 .5rem;font-size:2rem;letter-spacing:-0.02em}
			p{margin:0 0 1.25rem;color:rgba(230,238,248,0.85)}
			.meta{font-size:.95rem;color:rgba(230,238,248,0.6)}
			.logo{display:inline-block;width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#3b82f6);margin-bottom:.75rem}
			@media(min-width:640px){h1{font-size:2.25rem}}
		</style>
	</head>
	<body>
		<div class="wrap">
			<main class="card" role="main">
				<div class="logo" aria-hidden="true"></div>
				<h1>Content coming soon</h1>
				<p class="meta">We're working on something awesome. Check back later.</p>
				<p style="margin-top:1rem;color:rgba(230,238,248,0.45);font-size:.9rem">SSTDV-Project</p>
			</main>
		</div>
	</body>
</html>
